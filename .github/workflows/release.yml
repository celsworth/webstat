name: Build Release Archives

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            build_tool: cross
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            build_tool: cross

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.build_tool == 'cross'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        run: |
          if [[ "${{ matrix.build_tool }}" == "cross" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package zip archive
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi

          PKG_DIR="webstat-${VERSION}-${{ matrix.target }}"
          mkdir -p "${PKG_DIR}"

          cp "target/${{ matrix.target }}/release/webstat" "${PKG_DIR}/"
          cp README.md "${PKG_DIR}/"
          cp webstat.yml.example "${PKG_DIR}/"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            zip -r "${PKG_DIR}.zip" "${PKG_DIR}"
          fi

      - name: Upload tag zip artifact
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: webstat-${{ matrix.target }}
          path: webstat-v*-${{ matrix.target }}.zip
          if-no-files-found: error

      - name: Upload dev bundle artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: webstat-${{ matrix.target }}
          path: webstat-sha-*-${{ matrix.target }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
